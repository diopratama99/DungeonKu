name: dungeonku
description: Solo-player DnD-style mobile RPG with an LLM Dungeon Master.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # UI
  google_fonts: ^6.2.1
  flutter_cube: ^0.1.1   # 3D dice for d6
  cached_network_image: ^3.3.1

  # Misc
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.4.0
  http: ^1.2.0   # used by NgrokSkipClient wrapper

  # Audio (BGM looping + one-shot SFX)
  just_audio: ^0.9.40

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - supabase.json
    - assets/images/logo/
    - assets/images/avatars/
    - assets/images/icons/
    - assets/images/icons/processed/
    - assets/images/items/
    - assets/images/weapons/
    - assets/images/skills/
    - assets/images/elements/
    - assets/images/backgrounds/
    - assets/images/bosses/
    - assets/images/monsters/
    - assets/images/npcs/
    - assets/images/story-art/
    - assets/images/campaigns/covers/
    - assets/images/splash/
    - assets/audio/bgm/
    - assets/audio/sfx/
    # Bundled Google Fonts so the app never has to hit fonts.gstatic.com.
    - google_fonts/
